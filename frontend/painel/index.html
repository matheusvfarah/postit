<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PostIt Casa — Painel</title>
  <link rel="stylesheet" href="painel.css" />
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="header-pin">&#x2756;</span>
      <span class="logo">PostIt Casa</span>
    </div>
    <span class="subtitulo">Painel</span>
  </header>

  <main class="lista" id="lista">
    <div class="carregando">Carregando...</div>
  </main>

  <button class="fab" id="btnNovo" title="Novo bilhete">+</button>

  <div class="overlay" id="overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-titulo">Novo Bilhete</h2>
        <button class="btn-fechar" id="btnFechar">&times;</button>
      </div>

      <form id="form" novalidate>
        <input type="hidden" id="bilheteId" />

        <div class="campo">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="recado">&#x270E; Recado</option>
            <option value="lista">&#x2630; Lista</option>
            <option value="reuniao">&#x25F7; Reuni&atilde;o</option>
          </select>
        </div>

        <div class="campo">
          <label>Cor</label>
          <div class="cores">
            <label class="cor-opcao amarelo"><input type="radio" name="cor" value="amarelo" required /><span></span></label>
            <label class="cor-opcao rosa"><input type="radio" name="cor" value="rosa" /><span></span></label>
            <label class="cor-opcao verde"><input type="radio" name="cor" value="verde" /><span></span></label>
            <label class="cor-opcao azul"><input type="radio" name="cor" value="azul" /><span></span></label>
            <label class="cor-opcao laranja"><input type="radio" name="cor" value="laranja" /><span></span></label>
          </div>
        </div>

        <div class="campo">
          <label for="titulo">T&iacute;tulo</label>
          <input type="text" id="titulo" placeholder="Ex: Compras do m&ecirc;s" maxlength="100" required />
        </div>

        <div class="campo">
          <label for="autor">Autor</label>
          <input type="text" id="autor" placeholder="Seu nome" maxlength="50" required />
        </div>

        <div class="campo" id="campo-mensagem">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" placeholder="Escreva sua mensagem..." rows="3"></textarea>
        </div>

        <div class="campo" id="campo-horario" hidden>
          <label for="horario">Data e hor&aacute;rio</label>
          <input type="datetime-local" id="horario" />
        </div>

        <div class="campo" id="campo-lista" hidden>
          <label>Itens</label>
          <div class="itens-wrapper" id="itens-wrapper"></div>
          <button type="button" class="btn-add-item" id="btnAddItem">+ Adicionar item</button>
        </div>

        <div class="erro" id="erro" hidden></div>

        <button type="submit" class="btn-salvar">Salvar bilhete</button>
      </form>
    </div>
  </div>

  <script src="painel.js"></script>
</body>
</html>
